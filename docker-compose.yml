version: '3.9'

services:

  db:
    image: postgres:15-alpine
    container_name: helpdesk_db
    restart: always
    environment:
      POSTGRES_DB: support_db
      POSTGRES_USER: support_user
      POSTGRES_PASSWORD: support_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support_user -d support_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: helpdesk_web
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://support_user:support_pass@db:5432/support_db
      SECRET_KEY: super-secret-key-change-in-production
      FLASK_ENV: development
      FLASK_DEBUG: "1"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data: